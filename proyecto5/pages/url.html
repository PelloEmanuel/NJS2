<!DOCTYPE html>
<html lang="es" data-tema="claro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Módulo URL — Proyecto 5</title>
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="../style/main.css" />
</head>
<body>

  <div id="menu-container"></div>

  <div class="container my-4">
    <h1 class="text-center mb-1">🔗 Módulo URL</h1>
    <p class="text-center text-muted mb-4">
      Proyecto 3 integrado — módulo URL nativo de Node.js.
      Analiza host, path, params y más. Los resultados se muestran por consola del servidor.
    </p>

    <div class="row g-4">

      <div class="col-12 col-lg-5">
        <div class="card shadow-sm">
          <div class="card-header fw-bold">🔍 Analizar URL</div>
          <div class="card-body">

            <div class="mb-3">
              <label for="inputUrl" class="form-label">URL completa</label>
              <input type="text" id="inputUrl" class="form-control"
                placeholder="https://ejemplo.com/ruta?param=valor#hash" />
              <div class="form-text">Debe incluir protocolo (https://)</div>
            </div>

            <div id="msgUrl" class="form-text mb-2"></div>

            <button id="btnAnalizar" class="btn btn-primary w-100">🔬 Analizar</button>

            <div class="mt-3">
              <p class="form-text mb-1">Ejemplos rápidos:</p>
              <div class="d-flex flex-wrap gap-2">
                <button class="btn btn-sm btn-outline-secondary btn-ejemplo"
                  data-url="https://www.google.com/search?q=nodejs&lang=es">Google</button>
                <button class="btn btn-sm btn-outline-secondary btn-ejemplo"
                  data-url="https://github.com/user/repo?tab=readme#install">GitHub</button>
                <button class="btn btn-sm btn-outline-secondary btn-ejemplo"
                  data-url="http://localhost:3005/api/datos?id=42&formato=json">Localhost</button>
              </div>
            </div>

          </div>
        </div>
      </div>

      <div class="col-12 col-lg-7">
        <div class="card shadow-sm">
          <div class="card-header fw-bold">📊 Componentes de la URL</div>
          <div class="card-body">
            <div id="resultadoUrl">
              <p class="text-muted text-center">El análisis aparecerá aquí.</p>
            </div>
          </div>
        </div>

        <div class="card shadow-sm mt-3">
          <div class="card-header d-flex justify-content-between align-items-center">
            <span class="fw-bold">📋 Historial</span>
            <div class="d-flex gap-2">
              <button id="btnDescargarHistorial" class="btn btn-sm btn-outline-success">⬇ Descargar</button>
              <button id="btnLimpiarHistorial" class="btn btn-sm btn-outline-danger">🗑 Limpiar</button>
            </div>
          </div>
          <div class="card-body">
            <div id="msgHistorial" class="form-text mb-2"></div>
            <ul id="listaHistorial" class="list-group" style="max-height:160px;overflow-y:auto;"></ul>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../modules/url.js"></script>
</body>
</html>
