<!DOCTYPE html>
<html lang="es" data-tema="claro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora — Proyecto 5</title>
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="../style/main.css" />
</head>
<body>

  <div id="menu-container"></div>

  <div class="container my-4">
    <h1 class="text-center mb-1">🧮 Módulo de Cálculo</h1>
    <p class="text-center text-muted mb-4">
      Proyecto 1 integrado — módulo propio de cálculo matemático
    </p>

    <div class="row justify-content-center g-4">

      <div class="col-12 col-md-5">
        <div class="card shadow-sm">
          <div class="card-header fw-bold">🧮 Calculadora</div>
          <div class="card-body">

            <div class="mb-3">
              <label for="num1" class="form-label">Número 1</label>
              <input type="number" id="num1" class="form-control" placeholder="Ej: 10" />
            </div>

            <div class="mb-3">
              <label for="num2" class="form-label">Número 2</label>
              <input type="number" id="num2" class="form-control" placeholder="Ej: 5" />
            </div>

            <div class="mb-3">
              <label for="operacion" class="form-label">Operación</label>
              <select id="operacion" class="form-select">
                <option value="suma">Suma (+)</option>
                <option value="resta">Resta (-)</option>
                <option value="multiplicacion">Multiplicación (×)</option>
                <option value="division">División (÷)</option>
              </select>
            </div>

            <div id="msgCalculo" class="form-text mb-2"></div>

            <button id="btnCalcular" class="btn btn-primary w-100" type="button">
              Calcular y Guardar
            </button>

            <div id="resultadoCalculo" class="mt-3 fw-bold fs-5 text-center"></div>

          </div>
        </div>
      </div>

      <div class="col-12 col-md-6">
        <div class="card shadow-sm">
          <div class="card-header d-flex justify-content-between align-items-center">
            <span class="fw-bold">📋 Historial guardado</span>
            <button id="btnBorrarCalculos" class="btn btn-sm btn-danger">🗑 Borrar todo</button>
          </div>
          <div class="card-body">
            <ul id="listaCalculos" class="list-group lista-dinamica"></ul>
            <button id="btnDescargarCalculos" class="btn btn-outline-success w-100 mt-3">
              ⬇ Descargar calculos.txt
            </button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../modules/calculadora.js"></script>
</body>
</html>
