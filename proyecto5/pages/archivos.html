<!DOCTYPE html>
<html lang="es" data-tema="claro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Archivos HTML — Proyecto 5</title>
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="../style/main.css" />
</head>
<body>

  <div id="menu-container"></div>

  <div class="container my-4">
    <h1 class="text-center mb-1">📄 HTTP + File System</h1>
    <p class="text-center text-muted mb-4">
      Proyecto 2 integrado — crea archivos HTML dinámicamente con Node.js (módulo fs)
    </p>

    <div class="row g-4">

      <div class="col-12 col-lg-5">
        <div class="card shadow-sm">
          <div class="card-header fw-bold">➕ Crear archivo HTML</div>
          <div class="card-body">

            <div class="mb-3">
              <label for="nombreArchivo" class="form-label">Nombre del archivo</label>
              <div class="input-group">
                <input type="text" id="nombreArchivo" class="form-control"
                  placeholder="Ej: mi-pagina" maxlength="30" />
                <span class="input-group-text">.html</span>
              </div>
              <div class="form-text">Solo letras, números y guiones.</div>
            </div>

            <div class="mb-3">
              <label for="tituloArchivo" class="form-label">Título de la página</label>
              <input type="text" id="tituloArchivo" class="form-control"
                placeholder="Ej: Mi primera página" maxlength="80" />
            </div>

            <div class="mb-3">
              <label for="contenidoArchivo" class="form-label">Contenido</label>
              <textarea id="contenidoArchivo" class="form-control" rows="4"
                placeholder="Contenido principal de la página..."
                maxlength="500"></textarea>
            </div>

            <div id="msgCrear" class="form-text mb-2"></div>

            <button id="btnCrear" class="btn btn-primary w-100">
              📝 Crear y guardar HTML
            </button>

          </div>
        </div>
      </div>

      <div class="col-12 col-lg-7">
        <div class="card shadow-sm">
          <div class="card-header d-flex justify-content-between align-items-center">
            <span class="fw-bold">📁 Archivos generados en /data</span>
            <button id="btnRefrescar" class="btn btn-sm btn-outline-secondary">🔄 Refrescar</button>
          </div>
          <div class="card-body">
            <div id="msgLista" class="form-text mb-2"></div>
            <div id="listaArchivos">
              <p class="text-muted text-center">Cargando archivos...</p>
            </div>
          </div>
        </div>

        <div class="card shadow-sm mt-3">
          <div class="card-header fw-bold">👁 Vista previa</div>
          <div class="card-body p-0">
            <div id="msgPreview" class="p-3 form-text"></div>
            <iframe id="iframePreview" class="w-100"
              style="height:280px; border:none; display:none;"
              title="Previsualización"></iframe>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../modules/archivos.js"></script>
</body>
</html>
