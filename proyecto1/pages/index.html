<!DOCTYPE html>
<html lang="es" data-tema="claro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proyecto 1 — Módulos Propios</title>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
  />
  <link rel="stylesheet" href="../style/main.css" />
</head>
<body>

  <nav class="navbar navbar-expand-lg" id="navbar">
    <div class="container-fluid">
      <span class="navbar-brand fw-bold">⚙️ Proyecto 1 — Módulos Propios</span>
      <button class="btn btn-sm ms-auto" id="btnTema" type="button">
        🌙 Oscuro
      </button>
    </div>
  </nav>

  <div class="container my-4">
    <h1 class="text-center mb-4">Módulos Propios</h1>

    <div class="row g-4">

      <!-- ═══ MÓDULO CÁLCULO ═══ -->
      <div class="col-12 col-md-6">
        <div class="card h-100 shadow-sm">
          <div class="card-header fw-bold">🧮 Módulo de Cálculo</div>
          <div class="card-body">

            <div class="mb-3">
              <label for="num1" class="form-label">Número 1</label>
              <input type="number" id="num1" class="form-control"
                placeholder="Ej: 10" />
            </div>

            <div class="mb-3">
              <label for="num2" class="form-label">Número 2</label>
              <input type="number" id="num2" class="form-control"
                placeholder="Ej: 5" />
            </div>

            <div class="mb-3">
              <label for="operacion" class="form-label">Operación</label>
              <select id="operacion" class="form-select">
                <option value="suma">Suma (+)</option>
                <option value="resta">Resta (-)</option>
                <option value="multiplicacion">Multiplicación (×)</option>
                <option value="division">División (÷)</option>
              </select>
            </div>

            <div id="msgCalculo" class="form-text mb-2"></div>

            <button id="btnCalcular" class="btn btn-primary w-100" type="button">
              Calcular y Guardar
            </button>

            <div id="resultadoCalculo" class="mt-3 fw-bold fs-5 text-center"></div>

            <hr />

            <div class="d-flex justify-content-between align-items-center mb-2">
              <span class="fw-semibold">Historial guardado:</span>
              <button id="btnBorrarCalculos" class="btn btn-sm btn-danger">
                🗑 Borrar todo
              </button>
            </div>

            <ul id="listaCalculos" class="list-group lista-dinamica"></ul>

            <button id="btnDescargarCalculos"
              class="btn btn-outline-success w-100 mt-3" type="button">
              ⬇ Descargar calculos.txt
            </button>

          </div>
        </div>
      </div>

      <!-- ═══ MÓDULO CLIMA ═══ -->
      <div class="col-12 col-md-6">
        <div class="card h-100 shadow-sm">
          <div class="card-header fw-bold">🌤 Módulo de Clima (simulado)</div>
          <div class="card-body">

            <div class="mb-3">
              <label for="ciudad" class="form-label">Ciudad</label>
              <input type="text" id="ciudad" class="form-control"
                placeholder="Ej: Buenos Aires" maxlength="50" />
            </div>

            <div id="msgClima" class="form-text mb-2"></div>

            <button id="btnConsultarClima" class="btn btn-warning w-100" type="button">
              🔍 Consultar y Guardar
            </button>

            <div id="resultadoClima" class="mt-3 text-center"></div>

            <hr />

            <div class="d-flex justify-content-between align-items-center mb-2">
              <span class="fw-semibold">Historial de consultas:</span>
              <button id="btnBorrarClima" class="btn btn-sm btn-danger">
                🗑 Borrar todo
              </button>
            </div>

            <ul id="listaClima" class="list-group lista-dinamica"></ul>

            <button id="btnDescargarClima"
              class="btn btn-outline-success w-100 mt-3" type="button">
              ⬇ Descargar clima.txt
            </button>

          </div>
        </div>
      </div>

    </div>
  </div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
  ></script>
  <script type="module" src="../modules/main.js"></script>
</body>
</html>
