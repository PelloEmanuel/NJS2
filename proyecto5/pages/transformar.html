<!DOCTYPE html>
<html lang="es" data-tema="claro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NPM — Proyecto 5</title>
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="../style/main.css" />
</head>
<body>

  <div id="menu-container"></div>

  <div class="container my-4">
    <h1 class="text-center mb-1">📦 NPM — Transformar Texto</h1>
    <p class="text-center text-muted mb-4">
      Proyecto 4 integrado — paquetes instalados con <code>npm install</code>:
      <code>upper-case</code>, <code>lower-case</code>, <code>title-case</code>
    </p>

    <div class="row g-4">

      <div class="col-12 col-md-5">
        <div class="card shadow-sm">
          <div class="card-header fw-bold">✏️ Transformar texto</div>
          <div class="card-body">

            <div class="mb-3">
              <label for="textoInput" class="form-label">Texto a transformar</label>
              <textarea id="textoInput" class="form-control" rows="4"
                placeholder="Escribí cualquier texto aquí..."
                maxlength="300"></textarea>
              <div class="form-text">
                <span id="contadorChars">0</span>/300 caracteres
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Tipo de transformación</label>
              <div class="d-flex flex-column gap-2">
                <div class="form-check">
                  <input class="form-check-input" type="radio"
                    name="tipoTransf" id="radioUpper" value="upper" checked />
                  <label class="form-check-label" for="radioUpper">
                    MAYÚSCULAS — <code>upper-case</code>
                  </label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="radio"
                    name="tipoTransf" id="radioLower" value="lower" />
                  <label class="form-check-label" for="radioLower">
                    minúsculas — <code>lower-case</code>
                  </label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="radio"
                    name="tipoTransf" id="radioTitle" value="title" />
                  <label class="form-check-label" for="radioTitle">
                    Título — <code>title-case</code>
                  </label>
                </div>
              </div>
            </div>

            <div id="msgTransf" class="form-text mb-2"></div>

            <button id="btnTransformar" class="btn btn-primary w-100">
              🔄 Transformar y guardar
            </button>

            <div id="resultadoTransf" class="mt-3 p-3 rounded" style="display:none;
              background:var(--item-bg); border-left:4px solid var(--accent);">
              <div class="text-muted" style="font-size:.8rem">Resultado:</div>
              <div id="textoResultado" class="fw-bold fs-5 mt-1"></div>
              <div id="paqueteUsado" class="text-muted mt-1" style="font-size:.78rem"></div>
            </div>

          </div>
        </div>
      </div>

      <div class="col-12 col-md-7">
        <div class="card shadow-sm">
          <div class="card-header d-flex justify-content-between align-items-center">
            <span class="fw-bold">📋 Historial de transformaciones</span>
            <div class="d-flex gap-2">
              <button id="btnDescargar" class="btn btn-sm btn-outline-success">⬇</button>
              <button id="btnLimpiarTodo" class="btn btn-sm btn-outline-danger">🗑 Limpiar todo</button>
            </div>
          </div>
          <div class="card-body">
            <div id="msgLista" class="form-text mb-2"></div>
            <div id="contadorItems" class="form-text mb-2"></div>
            <ul id="listaTransformaciones" class="list-group lista-dinamica"></ul>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../modules/transformar.js"></script>
</body>
</html>
