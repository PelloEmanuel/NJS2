<!DOCTYPE html>
<html lang="es" data-tema="claro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clima — Proyecto 5</title>
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="../style/main.css" />
</head>
<body>

  <div id="menu-container"></div>

  <div class="container my-4">
    <h1 class="text-center mb-1">🌤 Módulo de Clima</h1>
    <p class="text-center text-muted mb-4">
      Proyecto 1 integrado — módulo propio de clima simulado
    </p>

    <div class="row justify-content-center g-4">

      <div class="col-12 col-md-5">
        <div class="card shadow-sm">
          <div class="card-header fw-bold">🌤 Consultar Clima</div>
          <div class="card-body">

            <div class="mb-3">
              <label for="ciudad" class="form-label">Ciudad</label>
              <input type="text" id="ciudad" class="form-control"
                placeholder="Ej: Buenos Aires" maxlength="50" />
            </div>

            <div id="msgClima" class="form-text mb-2"></div>

            <button id="btnConsultarClima" class="btn btn-warning w-100" type="button">
              🔍 Consultar y Guardar
            </button>

            <div id="resultadoClima" class="mt-3 text-center fs-5"></div>

          </div>
        </div>
      </div>

      <div class="col-12 col-md-6">
        <div class="card shadow-sm">
          <div class="card-header d-flex justify-content-between align-items-center">
            <span class="fw-bold">📋 Historial de consultas</span>
            <button id="btnBorrarClima" class="btn btn-sm btn-danger">🗑 Borrar todo</button>
          </div>
          <div class="card-body">
            <ul id="listaClima" class="list-group lista-dinamica"></ul>
            <button id="btnDescargarClima" class="btn btn-outline-success w-100 mt-3">
              ⬇ Descargar clima.txt
            </button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../modules/clima.js"></script>
</body>
</html>
